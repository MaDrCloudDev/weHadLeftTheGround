<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="weHadLeftTheGround - An interactive visual poem" />
    <meta name="theme-color" content="#050508" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      type="image/png"
      href="https://raw.githubusercontent.com/MaDrCloudDev/projectsImages/refs/heads/master/madrlogo.png"
    />
    <title>weHadLeftTheGround</title>
  </head>
  <body>
    <main class="columns" role="region" aria-label="Interactive visual poem">
      <div class="column column1" role="button" tabindex="0" aria-label="Poem: Are We Ready?">
        <p>Are</p>
        <p>We</p>
        <p>Ready?</p>
      </div>
      <div class="column column2" role="button" tabindex="0" aria-label="Poem: I Had Thought">
        <p>I</p>
        <p>Had</p>
        <p>Thought.</p>
      </div>
      <div class="column column3" role="button" tabindex="0" aria-label="Poem: Flap Left, Right">
        <p>Flap</p>
        <p>Left</p>
        <p>, ...Right.</p>
      </div>
      <div class="column column4" role="button" tabindex="0" aria-label="Poem: Take The Leap">
        <p>Take</p>
        <p>The</p>
        <p>Leap.</p>
      </div>
      <div
        class="column column5"
        role="button"
        tabindex="0"
        aria-label="Poem: The Ground, a Memory"
      >
        <p>The</p>
        <p>Ground</p>
        <p>, a Memory.</p>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
